services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: product-hub-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        networks:
            - product-hub-network
        depends_on:
            - redis
            - db

    nginx:
        image: nginx:alpine
        container_name: product-hub-nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - .:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - product-hub-network

    db:
        image: mysql:8.0
        container_name: product-hub-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: product_hub_db
            MYSQL_ROOT_PASSWORD: root
            MYSQL_USER: ph_app
            MYSQL_PASSWORD: ph@2026!
        ports:
            - "3306:3306"
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - product-hub-network

    scheduler:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: product-hub-scheduler
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
        networks:
            - product-hub-network
        depends_on:
            - db
            - redis
    queue:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: product-hub-queue
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www
        command: sh -c "php artisan queue:work sqs --queue=product-hub-queue --tries=3"
        networks:
            - product-hub-network
        depends_on:
            - db
            - redis

    redis:
        image: redis:alpine
        container_name: product-hub-redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        networks:
            - product-hub-network

networks:
    product-hub-network:
        driver: bridge

volumes:
    dbdata:
